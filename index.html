<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Squad Crowd Runner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        #hud { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .badge { background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; border: 2px solid #33ccff; font-weight: bold; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                       background: rgba(0,0,0,0.95); padding: 30px; border-radius: 20px; text-align: center; z-index: 20; border: 4px solid #33ccff; min-width: 320px; }
        .hidden { display: none !important; }
        
        button { background: #33ccff; color: white; border: none; padding: 12px 25px; font-size: 18px; border-radius: 10px; cursor: pointer; margin: 10px; font-weight: bold; }

        #bossBar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 350px; text-align: center; z-index: 10; }
        #bossBarBg { width: 100%; height: 18px; background: #222; border-radius: 10px; border: 2px solid white; overflow: hidden; margin-top: 5px; }
        #bossBarFill { height: 100%; background: linear-gradient(90deg, #00ffcc, #33ccff); width: 100%; }

        #joystickZone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 30; }
        #jumpBtn { position: absolute; bottom: 50px; right: 50px; width: 70px; height: 70px; background: rgba(51, 204, 255, 0.6); border: 2px solid white; border-radius: 50%; z-index: 30; font-weight: bold; line-height: 70px; text-align: center; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="badge">Gold: <span id="goldText">6000</span></div>
        <div class="badge">Level: 4</div>
        <div class="badge">Squad Size: 10</div>
    </div>

    <div id="bossBar">
        <div style="font-weight: bold; text-shadow: 2px 2px #000; font-size: 20px;">ULTRA BOSS LVL 4</div>
        <div id="bossBarBg"><div id="bossBarFill"></div></div>
    </div>

    <div id="menu">
        <h1 style="color: #33ccff; margin: 0;">SUPER SQUAD</h1>
        <p style="letter-spacing: 5px; color: #888; font-size: 12px;">CROWD RUNNER</p>
        <button onclick="initGame()">START MISSION</button><br>
        <button style="background: #444;">SQUAD SHOP</button>
    </div>

    <div id="joystickZone"></div>
    <div id="jumpBtn" onclick="jump()">JUMP</div>

    <script>
        let scene, camera, renderer, player, road;
        let obstacles = [], allies = [];
        let isPlaying = false;
        let moveX = 0, moveZ = 0;
        let velocityY = 0, isGrounded = true;

        function initGame() {
            document.getElementById('menu').classList.add('hidden');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 10, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); // High Graphics
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 15, 10);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8), light);

            // 3D Road and Rails
            const roadGeo = new THREE.BoxGeometry(10, 0.2, 1000);
            road = new THREE.Mesh(roadGeo, new THREE.MeshStandardMaterial({ color: 0x333333 }));
            road.position.z = -500;
            scene.add(road);

            const railMat = new THREE.MeshStandardMaterial({ color: 0xffa500 }); // Orange Rails
            const lRail = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 1000), railMat);
            lRail.position.set(-5.2, 0.4, -500);
            const rRail = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.8, 1000), railMat);
            rRail.position.set(5.2, 0.4, -500);
            scene.add(lRail, rRail);

            // Player and Crowd (Squad of 10)
            player = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.8), new THREE.MeshStandardMaterial({ color: 0xed1d24 }));
            player.position.y = 0.8;
            scene.add(player);

            for(let i = 0; i < 10; i++) {
                const ally = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.1, 0.5), new THREE.MeshStandardMaterial({ color: 0x00ff00 }));
                ally.position.set((Math.random()-0.5)*4, 0.6, 2 + (i*1.5));
                allies.push(ally);
                scene.add(ally);
            }

            camera.position.set(0, 5, 10);
            setupJoystick();
            isPlaying = true;
            animate();
        }

        function setupJoystick() {
            const manager = nipplejs.create({ zone: document.getElementById('joystickZone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'white' });
            manager.on('move', (evt, data) => {
                moveX = Math.cos(data.angle.radians) * (data.distance / 50);
                moveZ = Math.sin(data.angle.radians) * (data.distance / 50);
            });
            manager.on('end', () => { moveX = 0; moveZ = 0; });
        }

        function jump() { if(isGrounded) { velocityY = 0.4; isGrounded = false; } }

        function animate() {
            if(!isPlaying) return;
            requestAnimationFrame(animate);

            velocityY -= 0.02;
            player.position.y += velocityY;
            if(player.position.y < 0.8) { player.position.y = 0.8; velocityY = 0; isGrounded = true; }

            player.position.x += moveX * 0.12;
            player.position.x = Math.max(-4.5, Math.min(4.5, player.position.x));
            
            // Auto-run forward (Lvl 5 Logic)
            player.position.z -= 0.2;

            // Allies follow logic
            allies.forEach((ally, index) => {
                ally.position.z = player.position.z + 2 + (index * 1.2);
                ally.position.x += (player.position.x - ally.position.x) * 0.05;
            });

            camera.position.z = player.position.z + 10;
            camera.position.x = player.position.x * 0.5;
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
