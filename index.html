<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Squad Pro: Crowd Runner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        #hud { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .badge { background: rgba(0,0,0,0.85); padding: 10px 20px; border-radius: 25px; border: 2px solid #00ffcc; font-weight: bold; box-shadow: 0 0 15px rgba(0,255,204,0.3); }
        #bossBar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 380px; text-align: center; z-index: 10; }
        #bossName { font-weight: bold; text-shadow: 2px 2px #000; font-size: 22px; color: #00ffcc; letter-spacing: 2px; }
        #bossBarBg { width: 100%; height: 20px; background: #111; border-radius: 10px; border: 2px solid white; overflow: hidden; margin-top: 5px; }
        #bossBarFill { height: 100%; background: linear-gradient(90deg, #00ffcc, #33ccff); width: 100%; box-shadow: 0 0 10px #00ffcc; }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; border: 8px solid #00ffcc; }
        h1 { font-size: 50px; color: #00ffcc; margin: 0; text-shadow: 0 0 20px #00ffcc; }
        button { background: #00ffcc; color: #000; border: none; padding: 15px 40px; font-size: 22px; border-radius: 15px; cursor: pointer; margin: 10px; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.1); box-shadow: 0 0 20px #00ffcc; }
        #joystickZone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 30; opacity: 0.7; }
        #jumpBtn { position: absolute; bottom: 50px; right: 50px; width: 80px; height: 80px; background: rgba(0, 255, 204, 0.4); border: 3px solid white; border-radius: 50%; z-index: 30; font-weight: bold; line-height: 80px; text-align: center; color: white; text-shadow: 1px 1px black; }
    </style>
</head>
<body>
    <div id="hud">
        <div class="badge">GOLD: <span id="goldText">6000</span></div>
        <div class="badge">LEVEL: 4</div>
        <div class="badge">SQUAD: 10</div>
    </div>
    <div id="bossBar">
        <div id="bossName">ULTRA BOSS LVL 4</div>
        <div id="bossBarBg"><div id="bossBarFill"></div></div>
    </div>
    <div id="menu">
        <h1>SUPER SQUAD</h1>
        <p style="letter-spacing: 8px; color: #666;">CROWD RUNNER PRO</p>
        <button onclick="initGame()">START MISSION</button>
        <button style="background: #333; color: white;">HERO SHOP (40)</button>
    </div>
    <div id="joystickZone"></div>
    <div id="jumpBtn" onclick="jump()">JUMP</div>

    <script>
        let scene, camera, renderer, player, road;
        let allies = [], obstacles = [];
        let isPlaying = false, moveX = 0, moveZ = 0, velocityY = 0, isGrounded = true;

        function initGame() {
            document.getElementById('menu').style.display = 'none';
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // High graphics shadows
            document.body.appendChild(renderer.domElement);

            // Advanced Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            // Realistic Road with Texture
            const roadGeo = new THREE.BoxGeometry(11, 0.2, 2000);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.position.z = -1000;
            road.receiveShadow = true;
            scene.add(road);

            // Orange Safety Rails
            const railGeo = new THREE.BoxGeometry(0.5, 1, 2000);
            const railMat = new THREE.MeshStandardMaterial({ color: 0xffa500, emissive: 0xffa500, emissiveIntensity: 0.3 });
            const lRail = new THREE.Mesh(railGeo, railMat); lRail.position.set(-5.5, 0.5, -1000);
            const rRail = new THREE.Mesh(railGeo, railMat); rRail.position.set(5.5, 0.5, -1000);
            scene.add(lRail, rRail);

            // Hero Capsule Shape
            const heroGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 12);
            player = new THREE.Mesh(heroGeo, new THREE.MeshStandardMaterial({ color: 0xed1d24, metalness: 0.4 }));
            player.position.y = 1;
            player.castShadow = true;
            scene.add(player);

            // Squad of 10
            for(let i = 0; i < 10; i++) {
                const ally = new THREE.Mesh(heroGeo, new THREE.MeshStandardMaterial({ color: 0x00ff00 }));
                ally.position.set((Math.random()-0.5)*4, 1, 3 + i*2);
                ally.castShadow = true;
                allies.push(ally);
                scene.add(ally);
            }

            camera.position.set(0, 6, 12);
            setupJoystick();
            isPlaying = true;
            animate();
        }

        function setupJoystick() {
            const manager = nipplejs.create({ zone: document.getElementById('joystickZone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: '#00ffcc' });
            manager.on('move', (evt, data) => {
                moveX = Math.cos(data.angle.radians) * (data.distance / 50);
                moveZ = Math.sin(data.angle.radians) * (data.distance / 50);
            });
            manager.on('end', () => { moveX = 0; moveZ = 0; });
        }

        function jump() { if(isGrounded) { velocityY = 0.45; isGrounded = false; } }

        function animate() {
            if(!isPlaying) return;
            requestAnimationFrame(animate);

            velocityY -= 0.02;
            player.position.y += velocityY;
            if(player.position.y < 1) { player.position.y = 1; velocityY = 0; isGrounded = true; }

            player.position.x += moveX * 0.15;
            player.position.x = Math.max(-4.8, Math.min(4.8, player.position.x));
            player.position.z -= 0.25; // Auto-forward

            allies.forEach((ally, i) => {
                ally.position.z = player.position.z + 2 + (i * 1.5);
                ally.position.x += (player.position.x - ally.position.x) * 0.08;
            });

            camera.position.z = player.position.z + 12;
            camera.position.x = player.position.x * 0.6;
            camera.lookAt(player.position.x, 2, player.position.z);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
